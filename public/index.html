<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Songo – Jeu de semailles traditionnel</title>
  <meta name="description" content="Jouez au Songo, jeu de semailles traditionnel des Ekang du Cameroun. Trois modes : vs IA, 2 joueurs local, 2 joueurs en ligne."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .mode-cards { flex-wrap: wrap; gap: 1rem; }
    .mode-card  { flex: 1 1 200px; max-width: 220px; }
    .mode-card.remote { border-color: rgba(79,168,213,0.3); }
    .mode-card.remote:hover { border-color: var(--accent-blue); box-shadow: 0 12px 40px rgba(79,168,213,0.2); }
  </style>
</head>
<body>
  <div id="screen-home" class="screen active">
    <div class="home-bg">
      <div class="particles" id="particles"></div>
    </div>
    <div class="home-content">
      <div class="logo-area">
        <div class="logo-icon">♟</div>
        <h1 class="game-title">SONGO</h1>
        <p class="game-subtitle">Jeu de semailles traditionnel des Ekang</p>
        <div class="game-origin">Cameroun · Gabon · Guinée Équatoriale</div>
      </div>

      <div class="mode-cards">
        <!-- Mode 1 : vs IA -->
        <button class="mode-card" onclick="goTo('game.html?mode=ai&level='+aiLevel)">
          <div class="mode-icon">🤖</div>
          <div class="mode-title">vs IA</div>
          <div class="mode-desc">Affrontez l'intelligence artificielle</div>
          <div class="mode-levels">
            <span class="level-tag" data-level="easy"   onclick="selLevel(event,'easy')">Facile</span>
            <span class="level-tag active" data-level="medium" onclick="selLevel(event,'medium')">Moyen</span>
            <span class="level-tag" data-level="hard"   onclick="selLevel(event,'hard')">Difficile</span>
          </div>
        </button>

        <!-- Mode 2 : local 2 joueurs -->
        <button class="mode-card" onclick="goTo('local.html')">
          <div class="mode-icon">👥</div>
          <div class="mode-title">2 Joueurs</div>
          <div class="mode-desc">Même écran, tour par tour</div>
          <div class="mode-desc-small">Passez l'appareil à votre adversaire</div>
        </button>

        <!-- Mode 3 : en ligne -->
        <button class="mode-card remote" onclick="goTo('remote.html')">
          <div class="mode-icon">🌐</div>
          <div class="mode-title">En Ligne</div>
          <div class="mode-desc">2 joueurs à distance via AJAX</div>
          <div class="mode-desc-small">Créez ou rejoignez une salle</div>
        </button>
      </div>

      <button class="btn-rules" onclick="goTo('rules.html')">📖 Voir les règles</button>
    </div>
  </div>

  <script>
    let aiLevel = 'medium';
    function selLevel(e, lvl) {
      e.stopPropagation();
      aiLevel = lvl;
      document.querySelectorAll('.level-tag').forEach(t => t.classList.remove('active'));
      document.querySelectorAll(`.level-tag[data-level="${lvl}"]`).forEach(t => t.classList.add('active'));
    }
    function goTo(url) { window.location.href = url; }

    // Particles
    window.addEventListener('DOMContentLoaded', () => {
      const c = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 3;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;--dur:${Math.random()*6+5}s;--delay:${Math.random()*8}s;`;
        c.appendChild(p);
      }

    // ── Pied de page étudiant ──
    const footer = document.createElement('footer');
    footer.id = 'songo-footer';
    footer.innerHTML = `
      <div class="footer-inner">
        <span class="footer-sep">◈</span>
        <span class="footer-text">
          Tsombeng Geraldis Leclerc &nbsp;·&nbsp; Matricule 23U2976
          &nbsp;·&nbsp; Université de Yaoundé 1
        </span>
        <span class="footer-sep">◈</span>
      </div>
    `;
    document.body.appendChild(footer);
    });
  </script>
</body>
</html>
